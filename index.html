<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="shortcut icon" href="./assets/icons/fav-icon.png" type="image/x-icon">
    <script src="./scripts/template.js"></script>
    <script src="script.js"></script>
    <title>Pokedex</title>
</head>

<body onload="init()">
    <header>
        <section class="header-content">
            <img src="./assets/icons/fav-icon.png" alt="pokedex-logo">
            <h2>Pokedex</h2>
        </section>
    </header>
    <main>
        <article class="main-content" id="content">

            <section class="loader" id="loader" style="display: none;">
                <div class="spinner">
                    <img src="./assets/pics/loadingspinner.png" alt="">
                </div>
            </section>
            <section class="card" id="card">
                <div class="card-header">Header</div>
                <div class="card-body">
                    <p>Some quick example text to build on the card title and make up the bulk of the
                        card’s content.</p>
                </div>
                <div class="card-footer ">Footer</div>
            </section>
        </article>
    </main>
    <footer>
        <section class="footer-content">
            <p>&copy Jens Baumeister</p>
        </section>
    </footer>
</body>

</html>
