<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/colors.css">
    <link rel="shortcut icon" href="./assets/icons/fav-icon.png" type="image/x-icon">
    <script src="./scripts/template.js"></script>
    <script src="script.js"></script>
    <title>Pokedex</title>
</head>

<body onload="init()">
    <header>
        <section class="header-content">
            <div class="logo">
                <img src="./assets/icons/fav-icon.png" alt="pokedex-logo">
                <h2>Pokedex</h2>
            </div>
            <div class="search">
                <input type="search" id="poke-search" minlength="3" placeholder="Search...">
                <button onclick="search()" class="search-btn">search</button>
            </div>
        </section>
    </header>
    <main>
        <article class="main-content" id="content">

            <section class="loader" id="loader" style="display: none;">
                <div class="spinner">
                    <img src="./assets/pics/loadingspinner.png" alt="">
                </div>
            </section>
            <section class="card-area" id="card">

            </section>
            <section class="load">
                <button class="load-btn" onclick="loadMore()">Load More...</button>
            </section>
        </article>
    </main>
    <footer>
        <section class="footer-content">
            <p>&copy Jens Baumeister</p>
        </section>
    </footer>
</body>

</html>
