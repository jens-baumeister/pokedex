<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/colors.css">
    <link rel="shortcut icon" href="./assets/icons/fav-icon.png" type="image/x-icon">
    <script src="./scripts/template.js"></script>
    <script src="script.js"></script>
    <title>Pokedex</title>
</head>

<body onload="init()">
    <header>
        <section class="header-content">
            <div class="logo">
                <img src="./assets/icons/fav-icon.png" alt="pokedex-logo">
                <h2>Pokedex</h2>
            </div>
            <div class="search">
                <div class="search-bar">
                    <input type="search" id="poke-search" oninput="search()" placeholder="Search...">
                </div>
            </div>

            </div>
        </section>
    </header>
    <main>
        <article class="main-content" id="content">

            <overlay class="hidden" id="loading-overlay">
                <div class="spinner">
                    <img src="./assets/pics/loadingspinner.png" alt="">
                </div>
            </overlay>
            <section class="card-area" id="card">

            </section>
            <section class="load">
                <button class="load-btn" onclick="loadMore()">Load More...</button>
            </section>
        </article>

        <overlay class="pokecard" id="pokecard">
            <article class="pokemon-details">
                <section class="pokecard-header">
                    <p>ID:</p>
                    <div onclick="closePokeCard()" class="close-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>
                    </div>
                </section>
                <section class="pokecard-img"></section>
                <section class="pokecard-content"></section>
                <section class="pokecard-footer"></section>
            </article>
        </overlay>
    </main>
    <footer>
        <section class="footer-content">
            <p>&copy Jens Baumeister</p>
        </section>
    </footer>
</body>

</html>
